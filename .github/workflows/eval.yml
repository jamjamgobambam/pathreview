name: RAG Evaluation

on:
  pull_request:
    paths:
      - "rag/**"
      - "ingestion/chunking/**"
      - "ingestion/embeddings/**"

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Run RAG eval suite
        run: python scripts/run_evals.py
        env:
          LLM_PROVIDER: mock
      - name: Comment eval results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let results = 'Eval results not found.';
            try {
              results = fs.readFileSync('eval_results.json', 'utf8');
            } catch (e) {}
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## RAG Evaluation Results\n\`\`\`json\n${results}\n\`\`\``
            });
